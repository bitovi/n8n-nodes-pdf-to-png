name: Release
 
on:
  release:
    types: [published]
 
jobs:
  stage:
    uses: bitovi/.github/.github/workflows/npm-stage-publish.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      # Pre-release GitHub Releases publish under the "beta" dist-tag; normal releases go to latest.
      dist-tag: ${{ github.event.release.prerelease && 'beta' || '' }}